name: 📈 스윙매매 종목 스크리닝

on:
  # 매일 08:30 UTC = 17:30 KST (장 마감 후), 월~금만 실행
  schedule:
    - cron: '30 8 * * 1-5'

  # GitHub Actions 탭에서 수동 실행 버튼
  workflow_dispatch:
    inputs:
      dry_run:
        description: '구글시트 기록 없이 콘솔만 출력 (true = 기록 안 함)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  screen:
    name: 종목 스크리닝 실행
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 셋업
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 스크리너 실행
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          GOOGLE_CREDENTIALS_JSON: ${{ inputs.dry_run == 'true' && '' || secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python swing_screener.py

      - name: 실행 결과 요약
        if: always()
        run: |
          echo "## 📈 스크리닝 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 실행 시각 | $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST') |" >> $GITHUB_STEP_SUMMARY
          echo "| 상태 | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| dry_run | ${{ inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
